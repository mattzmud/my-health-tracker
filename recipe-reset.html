<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — MyWellpath Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#5c7a3e;--bg:#f7f3ed;--surface:#fdfaf6;--border:rgba(120,90,50,0.15);--text:#2c1f0e;--muted:#8a7560;--red:#b94040;--font-display:'Playfair Display',serif;--font-body:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;}
.logo{font-family:var(--font-display);font-size:20px;color:var(--accent);}
.logo span{color:var(--muted);font-weight:400;font-size:14px;margin-left:6px;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(44,31,14,0.12);}
h1{font-family:var(--font-display);font-size:24px;color:var(--text);margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px;}
input{width:100%;padding:11px 14px;border:1px solid rgba(120,90,50,0.25);border-radius:8px;font-size:14px;font-family:var(--font-body);background:var(--bg);color:var(--text);margin-bottom:14px;transition:border-color 0.15s;}
input:focus{outline:none;border-color:var(--accent);}
button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);}
.msg{font-size:13px;text-align:center;margin-top:12px;min-height:18px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="topbar"><div class="logo">MyWellpath <span>Recipes</span></div></div>
<div class="wrap">
  <div class="card">
    <h1>Set new password</h1>
    <p class="sub">Enter a new password for your MyWellpath Recipes account.</p>
    <div id="form-area">
      <label>New password</label>
      <input type="password" id="pw1" placeholder="At least 6 characters"/>
      <label>Confirm password</label>
      <input type="password" id="pw2" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')doReset()"/>
      <button onclick="doReset()">Set new password</button>
      <div class="msg" id="msg"></div>
    </div>
    <div id="success-area" style="display:none;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Password updated!</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">You can now sign in with your new password.</div>
      <a href="https://recipes.mywellpath.app" style="display:inline-block;padding:11px 24px;background:var(--accent);color:#fff;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none">Go to MyWellpath Recipes</a>
    </div>
  </div>
</div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,verifyPasswordResetCode,confirmPasswordReset}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const app=initializeApp({
  apiKey:"AIzaSyBYydRtTKLzYkoBG3GynlqqPatsFhgEJk4",
  authDomain:"mywellpath-recipes.firebaseapp.com",
  projectId:"mywellpath-recipes",
  storageBucket:"mywellpath-recipes.firebasestorage.app",
  messagingSenderId:"445340142668",
  appId:"1:445340142668:web:25e2c2ce429869dfedf8e9"
});
const auth=getAuth(app);

// Get oobCode from URL
const params=new URLSearchParams(window.location.search);
const oobCode=params.get('oobCode');
if(!oobCode){
  document.getElementById('msg').style.color='var(--red)';
  document.getElementById('msg').textContent='Invalid or expired reset link.';
  document.querySelector('button').disabled=true;
}

window.doReset=async function(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  const msg=document.getElementById('msg');
  msg.textContent='';
  if(!pw1||pw1.length<6){msg.style.color='var(--red)';msg.textContent='Password must be at least 6 characters.';return;}
  if(pw1!==pw2){msg.style.color='var(--red)';msg.textContent='Passwords do not match.';return;}
  const btn=document.querySelector('button');
  btn.innerHTML='<div class="spinner"></div>';btn.disabled=true;
  try{
    await verifyPasswordResetCode(auth,oobCode);
    await confirmPasswordReset(auth,oobCode,pw1);
    document.getElementById('form-area').style.display='none';
    document.getElementById('success-area').style.display='block';
  }catch(e){
    let m='Reset failed. The link may have expired.';
    if(e.code==='auth/weak-password')m='Password must be at least 6 characters.';
    if(e.code==='auth/invalid-action-code')m='This reset link is invalid or has already been used.';
    msg.style.color='var(--red)';msg.textContent=m;
    btn.innerHTML='Set new password';btn.disabled=false;
  }
};
</script>
</body>
</html>
