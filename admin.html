<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyWellpath Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f0e8;--surface:#faf7f2;--surface2:#ede8de;
  --border:#d4cbba;--border2:#c8bfaa;
  --text:#2c2416;--muted:#7a6f5e;
  --accent:#556b2f;--accent2:#7a9a3a;
  --red:#c0392b;--amber:#8a6a1a;--blue:#2a5a8a;--purple:#5a3a8a;
  --font-display:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(85,107,47,0.08);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%,rgba(85,107,47,0.07) 0%,transparent 60%),var(--bg);}
.login-card{width:380px;padding:48px 40px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);}
.login-logo{font-family:var(--font-display);font-size:32px;color:var(--accent);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;}
.login-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:8px;}
.login-input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--font-body);font-size:14px;margin-bottom:16px;transition:border-color 0.2s;}
.login-input:focus{outline:none;border-color:var(--accent);}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.login-btn:hover{background:var(--accent2);}
.login-error{font-size:13px;color:var(--red);margin-top:12px;text-align:center;min-height:20px;}
.login-forgot{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;cursor:pointer;text-decoration:underline;}

#not-authorized{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;}

/* TOPBAR */
#admin-panel{display:none;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(232,224,208,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 32px;height:64px;
  display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(85,107,47,0.08);}
.topbar-logo{font-family:var(--font-display);font-size:22px;color:var(--accent);}
.topbar-logo span{color:var(--muted);font-family:var(--font-body);font-size:13px;margin-left:8px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.admin-email{font-size:13px;color:var(--muted);}
.signout-link{font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-body);}

.main{padding:32px;max-width:1000px;margin:0 auto;}
.page-title{font-family:var(--font-display);font-size:30px;color:var(--text);margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 20px;}
.stat-pill-val{font-family:var(--font-display);font-size:28px;}
.stat-pill-label{font-size:12px;color:var(--muted);margin-top:2px;}

.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;}
.search-input:focus{outline:none;border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.refresh-btn{padding:10px 18px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;cursor:pointer;font-family:var(--font-body);transition:all 0.2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

.users-grid{display:flex;flex-direction:column;gap:10px;}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;
  transition:box-shadow 0.2s,border-color 0.2s;box-shadow:var(--shadow);}
.user-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(85,107,47,0.12);}
.user-avatar{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;min-width:0;}
.user-name{font-weight:600;font-size:14px;color:var(--text);}
.user-email{font-size:12px;color:var(--muted);}
.user-uid{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.user-meta{display:flex;gap:6px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.pill-green{background:rgba(85,107,47,0.1);color:var(--accent);}
.pill-red{background:rgba(192,57,43,0.1);color:var(--red);}
.pill-amber{background:rgba(138,106,26,0.1);color:var(--amber);}
.pill-muted{background:rgba(122,111,94,0.1);color:var(--muted);}
.arrow-icon{color:var(--muted);font-size:16px;flex-shrink:0;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* DETAIL MODAL */
.panel-overlay{position:fixed;inset:0;background:rgba(44,36,22,0.6);z-index:200;
  backdrop-filter:blur(4px);opacity:0;transition:opacity 0.2s;pointer-events:none;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.panel-overlay.open{opacity:1;pointer-events:all;}
.side-panel{background:var(--surface);border-radius:16px;border:1px solid var(--border);
  width:min(740px,100%);max-height:88vh;overflow-y:auto;
  transform:scale(0.96) translateY(8px);transition:transform 0.2s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.side-panel.open{transform:scale(1) translateY(0);}
.panel-header{position:sticky;top:0;background:rgba(250,247,242,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:18px 24px;
  display:flex;align-items:center;gap:14px;z-index:10;border-radius:16px 16px 0 0;}
.panel-avatar{width:48px;height:48px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;}
.panel-avatar img{width:100%;height:100%;object-fit:cover;}
.panel-close{margin-left:auto;background:none;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--muted);cursor:pointer;padding:6px 12px;font-family:var(--font-body);}
.panel-close:hover{border-color:var(--red);color:var(--red);}
.panel-body{padding:20px 24px 24px;}

/* Collapsible sections */
.panel-section{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel-section-title{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;cursor:pointer;background:var(--surface2);user-select:none;
  font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.06em;}
.panel-section-title:hover{background:var(--nav);}
.panel-section-title .chevron{font-size:11px;color:var(--muted);transition:transform 0.2s;}
.panel-section.collapsed .chevron{transform:rotate(-90deg);}
.panel-section-body{padding:14px 16px;border-top:1px solid var(--border);display:block;}
.panel-section.collapsed .panel-section-body{display:none;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.detail-item .detail-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.detail-item .detail-val{font-size:13px;color:var(--text);}
.detail-item .detail-val.mono{font-family:var(--font-mono);font-size:11px;word-break:break-all;}

.action-btn{padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;
  font-family:var(--font-body);display:inline-flex;align-items:center;gap:6px;border:1px solid;transition:all 0.15s;}
.action-btn-blue{background:rgba(42,90,138,0.08);border-color:rgba(42,90,138,0.25);color:var(--blue);}
.action-btn-blue:hover{background:rgba(42,90,138,0.15);}
.action-btn-red{background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.25);color:var(--red);}
.action-btn-red:hover{background:rgba(192,57,43,0.15);}

/* History entries */
.history-entry{padding:12px 0;border-bottom:1px solid var(--border);}
.history-date{font-size:12px;font-weight:600;color:var(--text);}
.history-reason{font-size:11px;color:var(--muted);}
.history-change{font-size:12px;color:var(--accent);margin-top:4px;line-height:1.5;}
.history-text{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;
  margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;display:none;}
.history-toggle{font-size:11px;color:var(--muted);cursor:pointer;margin-top:6px;user-select:none;}
.history-toggle:hover{color:var(--accent);}
.history-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;}
.history-del:hover{color:var(--red);}

/* Food/fitness/vitals data tables */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{text-align:left;color:var(--muted);font-weight:500;padding:4px 8px;border-bottom:1px solid var(--border);}
.data-table td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;}
.data-table tr:last-child td{border-bottom:none;}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text);
  box-shadow:0 4px 16px rgba(85,107,47,0.15);z-index:999;animation:slideUp 0.2s ease;max-width:320px;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.modal-overlay{position:fixed;inset:0;background:rgba(44,36,22,0.5);display:flex;align-items:center;
  justify-content:center;z-index:500;}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  padding:32px;max-width:420px;width:90%;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-cancel{flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;}
.modal-confirm{flex:2;padding:10px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);
  border-radius:var(--radius-sm);color:var(--red);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;}

@media(max-width:600px){.main{padding:16px;}.topbar{padding:0 16px;}}

.ticket-card{padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--surface);}
.ticket-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;}
.ticket-status-select{font-size:12px;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;background:var(--surface2);color:var(--text);font-family:var(--font-body);}

.admin-nav-btn{padding:12px 18px;background:none;border:none;border-bottom:3px solid transparent;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
.admin-nav-btn:hover{color:var(--text);}
.admin-nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.notif-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;cursor:pointer;transition:box-shadow 0.15s;}
.notif-card:hover{box-shadow:0 2px 12px rgba(85,107,47,0.1);}
.notif-type-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;}
.notif-form-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">wp</div>
    <div class="login-sub">Admin panel — authorized access only</div>
    <label class="login-label">Email</label>
    <input type="email" class="login-input" id="admin-email-input" placeholder="admin@example.com" onkeydown="if(event.key==='Enter')document.getElementById('admin-pass').focus()"/>
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="admin-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button class="login-btn" onclick="doAdminLogin()" id="login-btn">Sign in →</button>
    <div class="login-forgot" onclick="doPasswordReset()">Forgot password?</div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="not-authorized" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;">
  <div style="font-family:var(--font-display);font-size:24px;color:var(--red);margin-bottom:12px;">Access denied</div>
  <div style="font-size:14px;color:var(--muted);margin-bottom:24px;">This account does not have admin privileges.</div>
  <button class="login-btn" style="width:200px" onclick="doSignOut()">Sign out</button>
</div>

<div id="admin-panel">
  <div class="topbar">
    <div class="topbar-logo">wp <span>admin</span></div>
    <div class="topbar-right">
      <div class="admin-email" id="admin-email-display"></div>
      <button class="signout-link" onclick="doSignOut()">Sign out</button>
    </div>
  </div>
  <!-- Admin Nav Bar -->
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;position:sticky;top:56px;z-index:90">
    <button id="admin-nav-users" onclick="toggleAdminView('users')" class="admin-nav-btn active">&#128100; Users</button>
    <button id="admin-nav-feedback" onclick="toggleAdminView('feedback')" class="admin-nav-btn" style="position:relative">
      &#128172; Feedback
      <span id="admin-feedback-badge" style="display:none;position:absolute;top:8px;right:6px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center">0</span>
    </button>
    <button id="admin-nav-notifications" onclick="toggleAdminView('notifications')" class="admin-nav-btn">&#128276; Notifications</button>
  </div>
  <div class="main">
    <div class="stats-row" id="stats-row"></div>
    <!-- Users view -->
    <div id="admin-users-view">
      <div class="search-bar">
        <input class="search-input" id="search-input" placeholder="Search by name, email, or user ID…" oninput="filterUsers()"/>
        <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
      </div>
      <div class="users-grid" id="users-grid">
        <div class="empty-state"><div class="spinner"></div>Loading users…</div>
      </div>
    </div>
    <!-- Feedback view -->
    <div id="admin-feedback-panel" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <div style="font-size:18px;font-family:var(--font-display);color:var(--text)">&#128172; Feedback tickets</div>
        <select id="fb-filter-type" onchange="loadAdminFeedback()" style="font-size:12px;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;background:var(--surface2);color:var(--text);font-family:var(--font-body)">
          <option value="">All types</option>
          <option value="Bug">🐛 Bugs</option>
          <option value="Feature">💡 Feature requests</option>
          <option value="Suggestion">💬 Suggestions</option>
          <option value="Feedback">👍 Feedback</option>
        </select>
        <select id="fb-filter-status" onchange="loadAdminFeedback()" style="font-size:12px;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;background:var(--surface2);color:var(--text);font-family:var(--font-body)">
          <option value="">All statuses</option>
          <option value="New">New</option>
          <option value="In review">In review</option>
          <option value="In progress">In progress</option>
          <option value="Done">Done</option>
          <option value="Closed">Closed</option>
        </select>
        <button onclick="loadAdminFeedback()" class="refresh-btn">↻ Refresh</button>
      </div>
      <div id="admin-feedback-list"><div class="empty-state"><div class="spinner"></div>Loading tickets…</div></div>
    </div>
    <!-- Notifications panel -->
    <div id="admin-notifications-panel" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div style="font-size:22px;font-family:var(--font-display);color:var(--text)">&#128276; Notification Deployment</div>
        <button class="btn btn-primary btn-sm" onclick="openNotifForm()">&#10133; New notification</button>
      </div>
      <!-- Tabs -->
      <div style="display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px">
        <button id="notif-tab-active" onclick="switchNotifTab('active')" class="admin-nav-btn active" style="padding:8px 16px">Active <span id="notif-tab-active-count" style="font-size:11px;background:rgba(85,107,47,0.15);color:var(--accent);border-radius:10px;padding:1px 6px;margin-left:4px"></span></button>
        <button id="notif-tab-inactive" onclick="switchNotifTab('inactive')" class="admin-nav-btn" style="padding:8px 16px">Deactivated <span id="notif-tab-inactive-count" style="font-size:11px;background:rgba(122,111,94,0.12);color:var(--muted);border-radius:10px;padding:1px 6px;margin-left:4px"></span></button>
      </div>
      <!-- Notification list -->
      <div id="admin-notif-list"><div class="empty-state"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
</div>


<!-- Detail modal -->
<div class="panel-overlay" id="panel-overlay" onclick="if(event.target===this)closePanel()">
  <div class="side-panel" id="side-panel">
    <div class="panel-header" id="panel-header">
      <div class="panel-avatar" id="panel-avatar">👤</div>
      <div>
        <div style="font-weight:600;font-size:16px;color:var(--text)" id="panel-name">—</div>
        <div style="font-size:13px;color:var(--muted)" id="panel-email-label">—</div>
      </div>
      <button onclick="if(currentPanelUid)openPanel(currentPanelUid)" title="Refresh" style="background:none;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;padding:6px 10px;font-family:var(--font-body);margin-left:auto">&#8635; Refresh</button>
      <button class="panel-close" onclick="closePanel()" style="margin-left:8px">✕ Close</button>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state"><div class="spinner"></div>Loading…</div>
    </div>
  </div>
</div>

</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut,sendPasswordResetEmail}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,collection,getDocs,deleteDoc,writeBatch}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyCtF07EW4j93mdLhPgEPKWC5npOnXRUb3Y",
  authDomain:"my-health-tracker-d8d0d.firebaseapp.com",
  projectId:"my-health-tracker-d8d0d",
  storageBucket:"my-health-tracker-d8d0d.firebasestorage.app",
  messagingSenderId:"655023693628",
  appId:"1:655023693628:web:11936ef434649233998839"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let allUsers=[];
const PROJECT='my-health-tracker-d8d0d';
const FS=`https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

async function tok(){return auth.currentUser.getIdToken();}

async function fsGet(path){
  const r=await fetch(`${FS}/${path}`,{headers:{Authorization:'Bearer '+await tok()}});
  if(!r.ok)return null;
  return r.json();
}
async function fsList(path){
  const r=await fetch(`${FS}/${path}`,{headers:{Authorization:'Bearer '+await tok()}});
  if(!r.ok)return[];
  const d=await r.json();return d.documents||[];
}
async function fsDelete(path){
  await fetch(`${FS}/${path}`,{method:'DELETE',headers:{Authorization:'Bearer '+await tok()}});
}
function fv(f){
  if(!f)return null;
  if(f.stringValue!==undefined)return f.stringValue;
  if(f.booleanValue!==undefined)return f.booleanValue;
  if(f.integerValue!==undefined)return parseInt(f.integerValue);
  if(f.doubleValue!==undefined)return parseFloat(f.doubleValue);
  if(f.timestampValue!==undefined)return f.timestampValue;
  if(f.arrayValue)return(f.arrayValue.values||[]).map(fv);
  if(f.mapValue)return ff(f.mapValue.fields||{});
  return null;
}
function ff(fields){const o={};Object.entries(fields||{}).forEach(([k,v])=>o[k]=fv(v));return o;}
function docId(d){return d.name.split('/').pop();}
window.esc=function(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── AUTH ──
onAuthStateChanged(auth,async user=>{
  if(!user){show('login-screen');return;}
  const adminSnap=await getDoc(doc(db,'admins',user.uid));
  if(!adminSnap.exists()){show('not-authorized');return;}
  show('admin-panel');
  document.getElementById('admin-email-display').textContent=user.email;
  loadUsers();
});

function show(id){
  ['login-screen','not-authorized','admin-panel'].forEach(s=>{
    document.getElementById(s).style.display=s===id?(s==='admin-panel'?'block':'flex'):'none';
  });
}

window.doAdminLogin=async function(){
  const email=document.getElementById('admin-email-input').value.trim();
  const pass=document.getElementById('admin-pass').value;
  const err=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  if(!email||!pass){err.textContent='Please enter email and password.';return;}
  btn.textContent='Signing in…';btn.disabled=true;err.textContent='';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    const msgs={'auth/invalid-credential':'Incorrect email or password.','auth/user-not-found':'No account with that email.','auth/wrong-password':'Incorrect password.'};
    err.textContent=msgs[e.code]||e.message;
  }finally{btn.textContent='Sign in →';btn.disabled=false;}
};
window.doPasswordReset=async function(){
  const email=document.getElementById('admin-email-input').value.trim();
  if(!email){document.getElementById('login-error').textContent='Enter your email first.';return;}
  try{await sendPasswordResetEmail(auth,email);document.getElementById('login-error').style.color='var(--accent)';document.getElementById('login-error').textContent='Reset email sent!';}
  catch(e){document.getElementById('login-error').textContent=e.message;}
};
window.doSignOut=async function(){await signOut(auth);};

// ── LOAD USERS ──
window.loadUsers=async function(){
  document.getElementById('users-grid').innerHTML='<div class="empty-state"><div class="spinner"></div>Loading users…</div>';
  try{
    const docs=await fsList('users');
    const promises=docs.map(d=>loadUserSummary(docId(d)));
    allUsers=(await Promise.all(promises)).filter(Boolean).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    renderStats();renderUsers(allUsers);
  }catch(e){document.getElementById('users-grid').innerHTML=`<div class="empty-state">Error: ${e.message}</div>`;}
};

async function loadUserSummary(uid){
  try{
    const[sData,vsData,lData,aData,rootData]=await Promise.all([
      fsGet(`users/${uid}/profile/survey`).then(d=>d?ff(d.fields):{}),
      fsGet(`users/${uid}/vitals/settings`).then(d=>d?ff(d.fields):{}),
      fsGet(`users/${uid}/profile/lastLogin`).then(d=>d?ff(d.fields):{}),
      fsGet(`users/${uid}/profile/avatar`).then(d=>d?ff(d.fields):{}),
      fsGet(`users/${uid}`).then(d=>d?ff(d.fields):{}).catch(()=>({})),
    ]);
    return{uid,name:sData.name||'—',email:rootData.email||sData.email||lData.email||'—',
      dob:sData.dob||null,age:sData.age||null,createdAt:sData.createdAt||null,
      trackMeds:sData.trackMeds!==false,trackBP:vsData.trackBP||false,trackBS:vsData.trackBS||false,
      lastLoginDate:lData.date||null,lastLoginTs:lData.ts||null,
      device:lData.device||null,browser:lData.browser||null,avatarImg:aData.img||null,
      proteinGoal:sData.proteinGoal||null,waterGoal:sData.waterGoal||null,
      carbGoal:sData.carbGoal||null,calorieGoal:sData.calorieGoal||null,
    };
  }catch(e){return null;}
}

function renderStats(){
  const pills=[
    ['Total users',allUsers.length,'var(--accent)'],
    ['Tracking meds',allUsers.filter(u=>u.trackMeds).length,'var(--purple)'],
    ['Tracking BP',allUsers.filter(u=>u.trackBP).length,'var(--red)'],
    ['Tracking sugar',allUsers.filter(u=>u.trackBS).length,'var(--amber)'],
  ];
  document.getElementById('stats-row').innerHTML=pills.map(([l,v,c])=>
    `<div class="stat-pill"><div class="stat-pill-val" style="color:${c}">${v}</div><div class="stat-pill-label">${l}</div></div>`
  ).join('');
}

window.filterUsers=function(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  renderUsers(q?allUsers.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.uid||'').toLowerCase().includes(q)):allUsers);
};

function renderUsers(users){
  if(!users.length){document.getElementById('users-grid').innerHTML='<div class="empty-state">No users found.</div>';return;}
  document.getElementById('users-grid').innerHTML=users.map(u=>{
    const av=u.avatarImg?`<img src="${u.avatarImg}" alt=""/>`:'👤';
    const pills=[
      u.trackMeds?'<span class="pill pill-green">Meds</span>':'<span class="pill pill-muted">No meds</span>',
      u.trackBP?'<span class="pill pill-red">BP</span>':'',
      u.trackBS?'<span class="pill pill-amber">Sugar</span>':'',
    ].filter(Boolean).join('');
    return`<div class="user-card" onclick="openPanel('${u.uid}')">
      <div class="user-avatar">${av}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.name)}</div>
        <div class="user-email">${esc(u.email)}</div>
        <div class="user-uid">${u.uid}</div>
      </div>
      <div class="user-meta">${pills}</div>
      <div class="arrow-icon">›</div>
    </div>`;
  }).join('');
}

// ── SLIDE-IN PANEL ──
let currentPanelUid=null;

window.openPanel=async function(uid){
  currentPanelUid=uid;
  const u=allUsers.find(u=>u.uid===uid)||{uid};
  // Set header
  document.getElementById('panel-name').textContent=u.name||'—';
  document.getElementById('panel-email-label').textContent=u.email||'—';
  document.getElementById('panel-avatar').innerHTML=u.avatarImg?`<img src="${u.avatarImg}" alt=""/>`:'👤';
  document.getElementById('panel-body').innerHTML='<div class="empty-state"><div class="spinner"></div>Loading all data…</div>';
  // Open panel
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
  // modal doesn't need body overflow lock
  // Load full data
  const data=await loadFullUserData(uid);
  renderPanelBody(uid,data);
};

window.togglePanelSection=function(el){
  el.closest('.panel-section').classList.toggle('collapsed');
};

window.closePanel=function(){
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  currentPanelUid=null;
};

async function loadFullUserData(uid){
  const cols=['food','fitness','meds','weights','journal','vitals','badges','chats','recipes'];
  const[sData,vsData,lData,medsListData,rootDoc,...colData]=await Promise.all([
    fsGet(`users/${uid}/profile/survey`).then(d=>d?ff(d.fields):{}),
    fsGet(`users/${uid}/vitals/settings`).then(d=>d?ff(d.fields):{}),
    fsGet(`users/${uid}/profile/lastLogin`).then(d=>d?ff(d.fields):{}),
    fsGet(`users/${uid}/medications/list`).then(d=>d?ff(d.fields):{}),
    fsGet(`users/${uid}`).then(d=>d?ff(d.fields):{}).catch(()=>({})),
    ...cols.map(c=>fsList(`users/${uid}/${c}`).then(docs=>({col:c,docs})))
  ]);
  const colMap={};
  colData.forEach(({col,docs})=>{
    colMap[col]=docs.map(d=>({id:docId(d),...ff(d.fields)}));
  });
  return{survey:sData,vitalSettings:vsData,lastLogin:lData,medsList:medsListData,rootDoc,...colMap};
}

function renderPanelBody(uid,d){
  const s=d.survey||{};
  const l=d.lastLogin||{};
  const computeAge=dob=>{if(!dob)return null;const t=new Date(),b=new Date(dob);let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a;};
  const age=s.dob?computeAge(s.dob):(s.age||'—');
  const lastLogin=l.ts?new Date(l.ts).toLocaleString():(l.date||'—');

  let html='';

  // ── ACCOUNT INFO ──
  html+=section('Account info',`
    <div class="detail-grid">
      ${di('Firebase UID',`<span class="mono">${uid}</span>`)}
      ${di('Email',esc(d.rootDoc?.email||s.email||l.email||'—'))}
      ${di('Name',esc(s.name||'—'))}
      ${di('Date of birth',s.dob?new Date(s.dob+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'—')}
      ${di('Age',''+age)}
      ${di('Account created',s.createdAt||'—')}
      ${di('Last login',lastLogin)}
      ${di('Device / browser',(l.device||'—')+(l.browser?' · '+l.browser:''))}
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="action-btn action-btn-blue" onclick="doSendReset('${esc(s.email||'')}')">✉ Send password reset</button>
      <button class="action-btn action-btn-red" onclick="confirmWipe('${uid}','${esc(s.name||'')}')">⚠ Reset all data</button>
    </div>`);

  // ── NUTRITION GOALS ──
  html+=section('Nutrition goals',`
    <div class="detail-grid">
      ${di('Protein goal',(s.proteinGoal||'—')+'g')}
      ${di('Water goal',(s.waterGoal||'—')+' oz')}
      ${di('Carb limit',(s.carbGoal||'—')+'g')}
      ${di('Calorie goal',(s.calorieGoal||'—')+' kcal')}
      ${di('Sugar limit',(s.sugarGoal||'—')+'g/day')}
      ${di('Fiber goal',(s.fiberGoal||'—')+'g/day')}
      ${di('Current intake (reported)',(s.currentCalories||'—')+' kcal')}
    </div>`);

  // ── HEALTH PROFILE ──
  const conditions=(s.conditions||[]).join(', ')||'None';
  const meds=d.medsList&&d.medsList.meds?Object.values(d.medsList.meds).filter(m=>!m.deletedDate).map(m=>m.name+(m.dose?' '+m.dose:'')).join(', '):'None';
  // Build HRT display string
  const hrtDisplay=s.hrt==='Yes'?('Yes'+(s.hrtDetail?' — '+s.hrtDetail:'')):(s.hrt||'Not specified');

  html+=section('Health profile',`
    <div class="detail-grid">
      ${di('Conditions',conditions)}
      ${di('Current weight',(s.currentWeight||'—')+' lbs')}
      ${di('Goal weight',(s.goalWeight||'—')+' lbs')}
      ${di('Height',s.height||'—')}
      ${di('Activity level',s.activityLevel||'—')}
      ${di('Fitness goals',(s.fitnessGoals||[]).join(', ')||'—')}
      ${di('Equipment',s.equipment||'—')}
      ${di('Session time',s.sessionTime||'—')}
    </div>
    <div style="margin-top:12px;padding:10px 12px;background:rgba(85,107,47,0.04);border:1px solid var(--border);border-radius:8px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Gender &amp; Hormone Profile</div>
      <div class="detail-grid">
        ${di('Identifies as',s.genderIdentity||'Not specified')}
        ${di('Biological sex',s.biologicalSex||'Not specified')}
        ${di('Hormone therapy',hrtDisplay)}
      </div>
    </div>
    <div style="margin-top:10px">${di('Active medications',meds)}</div>
    <div style="margin-top:6px">${di('Tracking','Meds: '+(s.trackMeds?'✓':'✗')+' · BP: '+(d.vitalSettings?.trackBP?'✓':'✗')+' · Blood sugar: '+(d.vitalSettings?.trackBS?'✓':'✗'))}</div>
    <div style="margin-top:6px">${(()=>{const bsR=[];(d.vitals||[]).filter(v=>v.id!=='settings').forEach(day=>(day.bs||[]).forEach(r=>{if(r.value)bsR.push(r.value);}));if(!bsR.length)return '';const avg=bsR.reduce((a,b)=>a+b,0)/bsR.length;const a1c=Math.round(((avg+46.7)/28.7)*10)/10;return di('Est. A1C',''+a1c.toFixed(1)+'% (from '+bsR.length+' readings)');})()}</div>`);
  // ── WELLPATH PLAN ──
  const plan=s.wellnessPlan;
  const history=s.planHistory||[];
  if(plan&&plan.text){
    let planHtml=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Current plan · Updated ${plan.updatedAt||'—'}</div>`;
    planHtml+=`<div style="font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;padding:10px;background:var(--surface2);border-radius:6px;margin-bottom:14px">${esc(plan.text)}</div>`;
    if(history.length>1){
      planHtml+=`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Plan history (${history.length-1} prior versions)</div>`;
      history.slice(1).forEach((h,i)=>{
        planHtml+=`<div class="history-entry">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div><span class="history-date">${h.updatedAt||'—'}</span> <span class="history-reason">${esc(h.reason||'')}</span></div>
            <button class="history-del" onclick="confirmDeleteHistory('${uid}',${i+1})" title="Delete this entry">🗑</button>
          </div>
          ${h.changeSummary?`<div class="history-change">${esc(h.changeSummary)}</div>`:''}
          <div class="history-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.textContent=this.textContent.includes('▶')?'▼ Hide plan text':'▶ View full plan text'">▶ View full plan text</div>
          <div class="history-text">${esc(h.text||'')}</div>
        </div>`;
      });
    }else{
      planHtml+='<div style="font-size:12px;color:var(--muted)">No prior history yet.</div>';
    }
    html+=section('MyWellpath plan',planHtml,true);
  }

  // ── RECENT WEIGHT ──
  const weights=(d.weights||[]).sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,10);
  if(weights.length){
    html+=section('Weight log (last 10)',`<table class="data-table">
      <tr><th>Date</th><th>Weight</th></tr>
      ${weights.map(w=>`<tr><td>${w.id||w.date||'—'}</td><td>${w.val||'—'} lbs</td></tr>`).join('')}
    </table>`);
  }

  // ── RECENT FOOD ──
  const foodDays=(d.food||[]).sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,5);
  if(foodDays.length){
    let foodHtml='';
    foodDays.forEach(day=>{
      const entries=day.entries||[];
      if(!entries.length)return;
      const totalCal=entries.reduce((a,e)=>a+(e.calories||0),0);
      const totalPro=entries.reduce((a,e)=>a+(e.protein||0),0);
      const totalCarbs=entries.reduce((a,e)=>a+(e.carbs||0),0);
      const totalSugar=entries.reduce((a,e)=>a+(e.sugar||0),0);
      const totalFiber=entries.reduce((a,e)=>a+(e.fiber||0),0);
      foodHtml+=`<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px">${day.id||'—'} <span style="color:var(--muted);font-weight:400">${Math.round(totalCal)} kcal · ${Math.round(totalPro)}g pro · ${Math.round(totalCarbs)}g carbs · ${Math.round(totalSugar)}g sugar · ${Math.round(totalFiber)}g fiber</span></div>
        <table class="data-table"><tr><th>Item</th><th>Meal</th><th>Cal</th><th>Pro</th><th>Carbs</th><th>Sugar</th><th>Fiber</th><th>Srv</th></tr>
        ${entries.map(e=>{
          const srcBadge=e.source==='off'
            ?'<span style="font-size:10px;color:#556b2f;background:rgba(85,107,47,0.1);padding:1px 5px;border-radius:3px;border:1px solid rgba(85,107,47,0.2);margin-left:4px">✓ Verified</span>'
            :e.source==='usda'
            ?'<span style="font-size:10px;color:#556b2f;background:rgba(85,107,47,0.1);padding:1px 5px;border-radius:3px;border:1px solid rgba(85,107,47,0.2);margin-left:4px">✓ USDA</span>'
            :e.source==='edited'
            ?'<span style="font-size:10px;color:#2a5a8a;background:rgba(42,90,138,0.1);padding:1px 5px;border-radius:3px;border:1px solid rgba(42,90,138,0.2);margin-left:4px">✎ Edited</span>'
            :e.source==='recipe'
            ?'<span style="font-size:10px;color:#7a6f5e;background:var(--surface2);padding:1px 5px;border-radius:3px;border:1px solid var(--border);margin-left:4px">🍽 Recipe</span>'
            :'';
          return`<tr><td>${esc(e.text||'')}${srcBadge}</td><td>${esc(e.time||'')}</td><td>${Math.round(e.calories||0)}</td><td>${Math.round(e.protein||0)}g</td><td>${Math.round(e.carbs||0)}g</td><td>${e.sugar!=null?Math.round(e.sugar)+'g':'—'}</td><td>${e.fiber!=null?Math.round(e.fiber)+'g':'—'}</td><td>${e.servings||1}</td></tr>`;
        }).join('')}
        </table></div>`;
    });
    html+=section('Recent food logs (last 5 days)',foodHtml||'<div style="font-size:12px;color:var(--muted)">No data.</div>');
  }

  // ── RECENT FITNESS ──
  const fitDays=(d.fitness||[]).sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,5);
  if(fitDays.length){
    let fitHtml='';
    fitDays.forEach(day=>{
      const done=Object.entries(day.done||{}).filter(([k,v])=>v===true&&k!=='_autoSwapped');
      const extras=(day.extras||[]);
      fitHtml+=`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">${day.id||'—'}</div>
        ${done.length?`<div style="font-size:11px;color:var(--muted)">Completed: ${done.map(([k])=>k).join(', ')}</div>`:''}
        ${extras.length?`<div style="font-size:11px;color:var(--muted)">Extra: ${extras.map(e=>e.text).join(', ')}</div>`:''}
        ${!done.length&&!extras.length?'<div style="font-size:11px;color:var(--muted)">No activity logged</div>':''}
      </div>`;
    });
    html+=section('Recent fitness (last 5 days)',fitHtml);
  }

  // ── VITALS ──
  const vitalDays=(d.vitals||[]).filter(v=>v.id!=='settings').sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,7);
  if(vitalDays.length){
    let vHtml='<table class="data-table"><tr><th>Date</th><th>Type</th><th>Reading</th><th>Context</th></tr>';
    vitalDays.forEach(day=>{
      (day.bp||[]).forEach(r=>vHtml+=`<tr><td>${day.id}</td><td>BP</td><td>${r.systolic}/${r.diastolic} mmHg</td><td>${r.time||'—'}</td></tr>`);
      (day.bs||[]).forEach(r=>vHtml+=`<tr><td>${day.id}</td><td>Blood sugar</td><td>${r.value} mg/dL</td><td>${r.context||'—'}</td></tr>`);
    });
    vHtml+='</table>';
    html+=section('Recent vitals (last 7 days)',vHtml);
  }

  // ── MEDICATIONS ──
  if(d.medsList&&d.medsList.meds){
    const meds=Object.values(d.medsList.meds);
    html+=section('Medications',`<table class="data-table">
      <tr><th>Name</th><th>Dose</th><th>Times</th><th>Added</th><th>Deleted</th></tr>
      ${meds.map(m=>`<tr><td>${esc(m.name||'')}${m.fiberGrams?`<span style="font-size:10px;color:#556b2f;background:rgba(85,107,47,0.1);padding:1px 5px;border-radius:8px;border:1px solid rgba(85,107,47,0.2);margin-left:4px">🌿 ${m.fiberGrams}g fiber</span>`:''}</td><td>${esc(m.dose||'—')}</td><td>${(m.times||[]).join(', ')}</td><td>${m.addedDate||'—'}</td><td style="color:${m.deletedDate?'var(--red)':'var(--muted)'}">${m.deletedDate||'Active'}</td></tr>`).join('')}
    </table>`);
  }

  // ── RECIPES ──
  const recipes=(d.recipes||[]).sort((a,b)=>(b.dateAdded||'').localeCompare(a.dateAdded||''));
  if(recipes.length){
    const recHtml=`<table class="data-table">
      <tr><th>Title</th><th>Source</th><th>Categories</th><th>Cal</th><th>Pro</th><th>Carbs</th><th>Added</th></tr>
      ${recipes.map(r=>`<tr>
        <td>${esc(r.title||'—')}</td>
        <td>${r.source==='coach'?'🤖 Coach':r.sourceType==='photo'?'📷 Photo':r.sourceType==='link'?'🔗 Link':'👤 Typed'}</td>
        <td style="font-size:11px">${(r.categories||[]).join(', ')||'—'}</td>
        <td>${r.calories?Math.round(r.calories)+' kcal':'—'}</td>
        <td>${r.protein?Math.round(r.protein)+'g':'—'}</td>
        <td>${r.carbs?Math.round(r.carbs)+'g':'—'}</td>
        <td>${r.dateAdded||'—'}</td>
      </tr>`).join('')}
    </table>`;
    html+=section('Recipes ('+recipes.length+')',recHtml,false);
  }

  // ── JOURNAL ──
  const journals=(d.journal||[]).sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,5);
  if(journals.length){
    html+=section('Recent journal entries',journals.map(j=>

window.doDeleteHistory=async function(uid,index){
  try{
    const sDoc=await fsGet(`users/${uid}/profile/survey`);
    if(!sDoc)return;
    const survey=ff(sDoc.fields);
    if(!survey.planHistory||!survey.planHistory[index]){showToast('Entry not found.','error');return;}
    survey.planHistory.splice(index,1);
    // Re-save via REST PATCH
    const token=await tok();
    const fields={};
    // Only patch planHistory field
    const encoded=encodeURIComponent(JSON.stringify(survey.planHistory));
    // Build Firestore value
    const histVal={arrayValue:{values:survey.planHistory.map(h=>({mapValue:{fields:Object.fromEntries(Object.entries(h).map(([k,v])=>[k,{stringValue:String(v||'')}]))}}))}};
    const body=JSON.stringify({fields:{planHistory:histVal}});
    const r=await fetch(`${FS}/users/${uid}/profile/survey?updateMask.fieldPaths=planHistory`,{
      method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body
    });
    if(r.ok){showToast('✓ History entry deleted.');openPanel(uid);}
    else{showToast('Save error: '+r.status,'error');}
  }catch(e){showToast('Error: '+e.message,'error');}
};

}

window.saveNotif=async function(editId){
  const title=(document.getElementById('nf-title')?.value||'').trim();
  const body=(document.getElementById('nf-body')?.value||'').trim();
  if(!title||!body){showToast('Title and body are required.','error');return;}
  const type=document.querySelector('[name="nf-type"]:checked')?.value||'informational';
  const autoOpen=document.getElementById('nf-auto-open')?.checked||false;
  const active=document.getElementById('nf-active')?.checked!==false;
  const actionType=document.getElementById('nf-action-type')?.value||'coach_prefill';
  const actionLabel=(document.getElementById('nf-action-label')?.value||'').trim();
  const actionPayload=(document.getElementById('nf-action-payload')?.value||'').trim();
  const actionSection=document.getElementById('nf-action-section-select')?.value||'dashboard';

  const id=editId||_slugify(title);
  const notif={
    id,title,body,type,autoOpen,active,
    createdAt:editId?undefined:new Date().toLocaleDateString('en-CA'),
    ...(type==='action'?{actionType,actionLabel,actionPayload,actionSection}:{}),
  };
  if(editId)delete notif.createdAt; // don't overwrite createdAt on edit

  try{
    const saveRes=await fetch(`${FS_ROOT}/app_notifications/${id}`,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+await tok(),'Content-Type':'application/json'},
      body:JSON.stringify({fields:await _notifToFields(notif)})
    });
    if(!saveRes.ok){
      const err=await saveRes.text();
      throw new Error('Firestore error: '+saveRes.status+' '+err.slice(0,100));
    }
    document.querySelector('.modal-overlay')?.remove();
    showToast(editId?'✓ Notification updated.':'✓ Notification published!');
    loadAdminNotifications();
  }catch(e){console.error('saveNotif error:',e);showToast('Error: '+e.message,'error');}
};

async function _notifToFields(notif){
  const fields={};
  for(const[k,v]of Object.entries(notif)){
    if(v===undefined)continue;
    fields[k]=await toFsVal(v);
  }
  return fields;
}

const FS_ROOT=`https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

async function getRootDocs(col){
  const r=await fetch(`${FS_ROOT}/${col}`,{headers:{Authorization:'Bearer '+await tok()}});
  if(!r.ok)return[];
  const d=await r.json();return d.documents||[];
}
async function toFsVal(v){
  if(typeof v==='string')return{stringValue:v};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:v}:{doubleValue:v};
  if(v===null)return{nullValue:null};
  if(Array.isArray(v))return{arrayValue:{values:await Promise.all(v.map(toFsVal))}};
  if(typeof v==='object'){
    const fields={};
    for(const[k,val]of Object.entries(v))fields[k]=await toFsVal(val);
    return{mapValue:{fields}};
  }
  return{stringValue:String(v)};
}

async function setRootDoc(col,id,data){
  const fields={};
  const updateMaskFields=[];
  for(const[k,v]of Object.entries(data)){
    fields[k]=await toFsVal(v);
    updateMaskFields.push(k);
  }
  // Use updateMask to only update specified fields — prevents overwriting other fields
  const maskQuery=updateMaskFields.map(f=>`updateMask.fieldPaths=${encodeURIComponent(f)}`).join('&');
  await fetch(`${FS_ROOT}/${col}/${id}?${maskQuery}`,{
    method:'PATCH',
    headers:{Authorization:'Bearer '+await tok(),'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
}

window.toggleAdminView=function(view){
  ['admin-users-view','admin-feedback-panel','admin-notifications-panel'].forEach(id=>{

  });
  ['users','feedback','notifications'].forEach(v=>{
    const btn=document.getElementById('admin-nav-'+v);
    if(btn)btn.classList.toggle('active',v===view);
  });
  const target=view==='users'?'admin-users-view':view==='feedback'?'admin-feedback-panel':'admin-notifications-panel';
  const el=document.getElementById(target);
  if(el)el.style.display='block';
  if(view==='feedback')loadAdminFeedback();
  if(view==='notifications')loadAdminNotifications();
};

window.loadAdminFeedback=async function(){
  const el=document.getElementById('admin-feedback-list');
  if(!el)return;
  const typeFilter=document.getElementById('fb-filter-type')?.value||'';
  const statusFilter=document.getElementById('fb-filter-status')?.value||'';
  try{
    const docs=await getRootDocs('feedback');
    let tickets=docs.map(d=>{
      const f=d.fields||{};
      // Parse messages array from Firestore format
      const messages=(f.messages?.arrayValue?.values||[]).map(mv=>{
        const mf=mv.mapValue?.fields||{};
        return{sender:mf.sender?.stringValue||'',senderName:mf.senderName?.stringValue||'',
          text:mf.text?.stringValue||'',ts:parseInt(mf.ts?.integerValue||0),
          createdAt:mf.createdAt?.stringValue||''};
      });
      return{id:d.name.split('/').pop(),type:f.type?.stringValue||'—',title:f.title?.stringValue||'—',
        status:f.status?.stringValue||'New',
        uid:f.uid?.stringValue||'—',name:f.name?.stringValue||'—',page:f.page?.stringValue||'—',
        device:f.device?.stringValue||'—',createdAt:f.createdAt?.stringValue||'—',
        createdTs:parseInt(f.createdTs?.integerValue||0),
        internalNote:f.internalNote?.stringValue||'',
        userRead:f.userRead?.booleanValue||false,
        adminRead:f.adminRead?.booleanValue||false,
        messages};
    }).filter(t=>(!typeFilter||t.type===typeFilter)&&(!statusFilter||t.status===statusFilter))
      .sort((a,b)=>b.createdTs-a.createdTs);
    const newCount=tickets.filter(t=>t.status==='New').length;
    const badge=document.getElementById('admin-feedback-badge');
    if(badge){badge.textContent=newCount;badge.style.display=newCount?'flex':'none';}
    if(!tickets.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">No tickets found.</div>';return;}
    const statusColors={New:'#2a5a8a','In review':'#8a6a1a','In progress':'#8a6a1a',Done:'#556b2f',Closed:'#7a6f5e'};
    const typeIcons={Bug:'🐛',Feature:'💡',Suggestion:'💬',Feedback:'👍'};
    el.innerHTML=tickets.map(t=>`<div class="ticket-card" id="ticket-${t.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap">
        <div><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">${typeIcons[t.type]||''} ${esc(t.title)}</div>
        <div style="font-size:11px;color:var(--muted)">${esc(t.name)} · ${esc(t.uid.slice(0,10))}… · Page: ${esc(t.page)} · ${esc(t.createdAt)}</div></div>
        <span class="ticket-badge" style="background:${statusColors[t.status]||'#7a6f5e'};color:#fff;flex-shrink:0">${esc(t.status)}</span>${!t.adminRead&&t.messages?.some(m=>m.sender==='user')?'<span style="width:8px;height:8px;background:#c0392b;border-radius:50%;display:inline-block;margin-left:6px"></span>':''}
      </div>
      ${t.description?`<div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border-radius:6px">${esc(t.description)}</div>`:''}
      ${t.device?`<div style="font-size:10px;color:var(--muted);margin-bottom:10px">${esc(t.device)}</div>`:''}
      <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Thread (${t.messages?.length||0} messages)</div>
        <div style="max-height:160px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:6px">
          ${(t.messages||[]).map(m=>`<div style="display:flex;flex-direction:column;align-items:${m.sender==='admin'?'flex-end':'flex-start'}">
            <div style="max-width:90%;padding:7px 10px;border-radius:8px;background:${m.sender==='admin'?'var(--accent)':'var(--surface2)'};color:${m.sender==='admin'?'#fff':'var(--text)'};font-size:12px;line-height:1.5">${esc(m.text||'')}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(m.senderName||m.sender)} · ${esc(m.createdAt||'')}</div>
          </div>`).join('')}
        </div>
        <textarea id="note-${t.id}" placeholder="Reply to user..." style="font-size:12px;min-height:50px;resize:vertical"></textarea>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <select class="ticket-status-select" id="status-${t.id}">
            ${['New','In review','In progress','Done','Closed'].map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
          </select>
          <button class="btn btn-primary btn-sm" data-tid="${t.id}" data-uid="${t.uid}" onclick="saveTicket(this.dataset.tid,this.dataset.uid)">Send reply</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" data-tid="${t.id}" onclick="deleteTicket(this.dataset.tid)">Delete</button>
        </div>
        <div style="margin-top:10px;padding:10px;background:rgba(138,106,26,0.06);border:1px solid rgba(138,106,26,0.2);border-radius:8px">
          <div style="font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px">&#128274; Internal notes — not visible to user</div>
          <textarea id="internal-${t.id}" placeholder="Private notes, follow-up reminders, internal context..." style="font-size:12px;min-height:50px;resize:vertical;width:100%;background:transparent;border-color:rgba(138,106,26,0.25)">${esc(t.internalNote||'')}</textarea>
          <button class="btn btn-ghost btn-sm" style="margin-top:6px;font-size:11px;color:var(--amber)" data-tid="${t.id}" onclick="saveInternalNote(this.dataset.tid)">Save internal note</button>
        </div>
        
        </div>
      </div></div>`).join('');
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--muted)">Error: ${e.message}</div>`;}
};

window.saveTicket=async function(id,uid){
  const status=document.getElementById('status-'+id)?.value||'New';
  const replyText=(document.getElementById('note-'+id)?.value||'').trim();
    const notify=!!replyText; // always notify user when a reply is typed
  try{
    // Fetch current ticket to get full messages array
    const docs=await getRootDocs('feedback');
    const ticketDoc=docs.find(d=>d.name.split('/').pop()===id);
    const existingFields=ticketDoc?.fields||{};
    let messages=[];
    if(existingFields.messages?.arrayValue?.values){
      messages=existingFields.messages.arrayValue.values.map(mv=>{
        const f=mv.mapValue?.fields||{};
        return{sender:f.sender?.stringValue||'',senderName:f.senderName?.stringValue||'',
          text:f.text?.stringValue||'',ts:parseInt(f.ts?.integerValue||0),
          createdAt:f.createdAt?.stringValue||''};
      });
    }
    if(replyText){
      messages.push({sender:'admin',senderName:'MyWellpath Team',text:replyText,
        ts:Date.now(),createdAt:new Date().toLocaleDateString('en-CA')});
    }
    await setRootDoc('feedback',id,{status,messages,adminRead:true,userRead:false});
    if(notify&&uid&&uid!=='—'){
      const notifId='notif-'+Date.now();
      await fetch(`${FS_ROOT}/users/${uid}/notifications/${notifId}`,{
        method:'PATCH',
        headers:{Authorization:'Bearer '+await tok(),'Content-Type':'application/json'},
        body:JSON.stringify({fields:{
          ticketId:{stringValue:id},
          message:{stringValue:'MyWellpath Team replied to your feedback'+(replyText?' — '+replyText.slice(0,100):'')},
          status:{stringValue:status},read:{booleanValue:false},
          createdAt:{stringValue:new Date().toLocaleDateString('en-CA')}
        }})
      });
    }
    const noteEl=document.getElementById('note-'+id);if(noteEl)noteEl.value='';
    showToast('✓ '+(replyText?'Reply sent':'Status updated')+(replyText?' · User notified':'')+'.');
    loadAdminFeedback();
  }catch(e){console.error('saveTicket:',e);showToast('Error: '+e.message,'error');}
};

window.saveInternalNote=async function(id){
  const text=(document.getElementById('internal-'+id)?.value||'').trim();
  try{
    await setRootDoc('feedback',id,{internalNote:text});
    showToast('&#128274; Internal note saved.');
  }catch(e){showToast('Error: '+e.message,'error');}
};

window.deleteTicket=async function(id){
  if(!confirm('Delete this ticket?'))return;
  try{
    await fetch(`${FS_ROOT}/feedback/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+await tok()}});
    document.getElementById('ticket-'+id)?.remove();
    showToast('Ticket deleted.');
  }catch(e){showToast('Error: '+e.message,'error');}
};
</script>
</body>
